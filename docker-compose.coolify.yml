# MidesCloud ERPNext — based on official frappe_docker/pwd.yml
# Adapted for Coolify with cloud.mides.kz

services:
  backend:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

  configurator:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: none
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        (
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        if [ ! -f "sites/frontend/site_config.json" ]; then
            echo "No site found. Creating new site: frontend";
            bench new-site frontend --db-root-password "$$MYSQL_ROOT_PASSWORD" --admin-password admin --install-app erpnext --force;
        fi;
        for site_path in sites/*/; do
            site_name=$$(basename "$$site_path")
            if [ "$$site_name" != "assets" ] && [ "$$site_name" != "languages" ] && [ -f "$${site_path}site_config.json" ]; then
                echo "Running migration for site: $$site_name";
                bench --site "$$site_name" migrate;
                for app in hrms print_designer insights dfp_external_storage pwa_frappe eps wiki; do
                    echo "Installing app $$app on site $$site_name...";
                    bench --site "$$site_name" install-app $$app || true;
                done;
            fi;
        done;
        ) > sites/create_site_execution.txt 2>&1;
        echo "=== LOGS LIST ===" > sites/bench_logs.txt;
        ls -la logs >> sites/bench_logs.txt;
        for log_file in logs/*; do
            if [ -f "$$log_file" ]; then
                echo "=== CONTENT OF $$log_file (LAST 200 LINES) ===" >> sites/bench_logs.txt;
                tail -n 200 "$$log_file" >> sites/bench_logs.txt 2>&1;
            fi;
        done;
        for site_path in sites/*/; do
            site_name=$$(basename "$$site_path")
            if [ "$$site_name" != "assets" ] && [ "$$site_name" != "languages" ] && [ -f "$${site_path}site_config.json" ]; then
                mkdir -p "$${site_path}public/files";
                cp sites/create_site_execution.txt "$${site_path}public/files/create_site_execution.log";
                cp sites/bench_logs.txt "$${site_path}public/files/bench_logs.log";
            fi;
        done;

  db:
    image: mariadb:11.8
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    depends_on:
      - websocket
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    expose:
      - "8080"

  queue-long:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: on-failure

  redis-cache:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: on-failure

  scheduler:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: ghcr.io/lepisevkalisey/mides-erpnext:${IMAGE_TAG:-develop}
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

