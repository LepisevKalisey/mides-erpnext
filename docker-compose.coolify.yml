# MidesCloud ERPNext — Monolithic Coolify deployment
# Image: ghcr.io/lepisevkalisey/mides-erpnext:develop

x-image: &image ghcr.io/lepisevkalisey/mides-erpnext:develop
x-volumes: &volumes
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs

services:
  erpnext:
    image: *image
    pull_policy: always
    entrypoint: ["/home/frappe/frappe-bench/entrypoint.sh"]
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_HOST: redis
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes: *volumes
    expose:
      - "8080"
    depends_on:
      - db
      - redis

  db:
    image: mariadb:11.8
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  redis:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  db-data:
  sites:
  logs:
